<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation & Summary</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e27;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #1a1f3a 0%, #2d1b4e 100%);
      padding: 20px;
      border-bottom: 2px solid #ff6b9d;
      box-shadow: 0 4px 20px rgba(255, 107, 157, 0.3);
    }
    
    h1 {
      font-size: 20px;
      color: #ff6b9d;
      text-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
      letter-spacing: 2px;
    }
    
    .subtitle {
      font-size: 11px;
      color: #a0a0a0;
      margin-top: 4px;
      letter-spacing: 1px;
    }
    
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .lang-selector {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .lang-selector label {
      color: #a0a0a0;
      font-size: 12px;
      letter-spacing: 1px;
    }
    
    .lang-selector select {
      flex: 1;
      padding: 8px 12px;
      background: #151932;
      border: 1px solid #2d3561;
      border-radius: 4px;
      color: #00f5ff;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .lang-selector select:focus {
      outline: none;
      border-color: #00f5ff;
      box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
    }
    
    .button-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    button {
      flex: 1;
      padding: 14px;
      border: 2px solid;
      background: transparent;
      color: inherit;
      font-family: inherit;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-translate {
      border-color: #00f5ff;
      color: #00f5ff;
    }
    
    .btn-translate:hover {
      background: #00f5ff;
      color: #0a0e27;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
    }
    
    .btn-summary {
      border-color: #ff6b9d;
      color: #ff6b9d;
    }
    
    .btn-summary:hover {
      background: #ff6b9d;
      color: #0a0e27;
      box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
    }
    
    .result-box {
      background: #151932;
      border: 1px solid #2d3561;
      border-radius: 8px;
      padding: 20px;
      min-height: 100px;
      line-height: 1.8;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
    }
    
    .result-box.loading {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00f5ff;
      font-style: italic;
    }
    
    .result-box.error {
      color: #ff4757;
      border-color: #ff4757;
    }
    
    .footer {
      padding: 16px 20px;
      background: #0d1128;
      border-top: 1px solid #2d3561;
      text-align: center;
      font-size: 11px;
      color: #666;
    }
    
    .footer a {
      color: #00f5ff;
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .loading {
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ TRANSLATION & SUMMARY</h1>
    <div class="subtitle">AI-POWERED TEXT PROCESSOR</div>
  </div>
  
  <div class="content">
    <div class="lang-selector">
      <label>目標語言:</label>
      <select id="targetLang">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="ru">Русский</option>
        <option value="ar">العربية</option>
      </select>
    </div>
    
    <div class="button-group">
      <button class="btn-translate" id="translateBtn">🌐 翻譯選中文本</button>
      <button class="btn-summary" id="summaryBtn">📝 總結頁面內容</button>
    </div>
    
    <div id="result" class="result-box">
      選擇文本後點擊「翻譯」，或點擊「總結」生成頁面摘要...
    </div>
  </div>
  
  <div class="footer">
    <a href="options.html" target="_blank">⚙️ 打開設置</a>
  </div>
  
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
